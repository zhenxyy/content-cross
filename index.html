<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContentCross · 跨平台内容分发</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="logo">✧ ContentCross</div>
      <p class="subtitle">写一次，发全网 · 智能改写适配各平台风格</p>
      <div class="header-actions">
        <button class="btn btn-sm" id="templateBtn">📄 填入示例</button>
        <button class="btn btn-sm" id="themeToggle">🌙 暗色</button>
      </div>
    </header>

    <!-- Main workspace -->
    <main class="workspace">

      <!-- Settings bar -->
      <section class="card settings-card">
        <div class="card-header">
          <h2>⚙️ 引擎设置</h2>
          <label class="toggle-label">
            <span id="engineLabel">🤖 AI 模式</span>
            <input type="checkbox" id="engineToggle" checked />
            <span class="toggle-track"></span>
          </label>
        </div>
        <div class="settings-body" id="settingsBody">
          <div class="settings-row">
            <label>DeepSeek API Key</label>
            <div class="api-input-wrap">
              <input type="password" id="apiKeyInput" placeholder="sk-xxxxxxxxxxxxxxxx" class="api-input" />
              <button class="btn btn-xs" id="toggleKeyVis">👁️</button>
              <button class="btn btn-xs" id="saveKeyBtn">保存</button>
            </div>
          </div>
          <div class="settings-row">
            <label>模型</label>
            <select id="modelSelect" class="select">
              <option value="deepseek-chat">deepseek-chat</option>
              <option value="deepseek-reasoner">deepseek-reasoner</option>
            </select>
          </div>
          <div class="settings-row">
            <span style="font-size:12px;color:var(--text-secondary)">💡 AI 模式用大模型改写，质量更高；规则模式不用 API Key，离线可用。</span>
          </div>
        </div>
      </section>

      <!-- Input section -->
      <section class="card input-card">
        <div class="card-header">
          <h2>📝 原文</h2>
          <div class="input-meta">
            <select id="sourcePlatform" class="select">
              <option value="xiaohongshu">来源：小红书</option>
              <option value="wechat">来源：公众号</option>
              <option value="douyin">来源：抖音脚本</option>
              <option value="zhihu">来源：知乎</option>
              <option value="bilibili">来源：B站</option>
            </select>
            <button class="btn btn-sm" id="clearBtn">清空</button>
          </div>
        </div>
        <textarea id="sourceText" placeholder="在这里粘贴你的原文……" spellcheck="false"></textarea>
        <div class="input-footer">
          <span id="charCount">0 字</span>
        </div>
      </section>

      <!-- Transform button -->
      <div class="transform-actions">
        <button class="btn btn-primary btn-lg" id="transformBtn">
          ⚡ 一键转换
        </button>
        <div class="target-selectors-wrap">
          <div class="target-actions">
            <span style="font-size:13px;color:var(--text-secondary)">目标平台：</span>
            <button class="btn btn-xs" id="selectAllTargets">全选</button>
            <button class="btn btn-xs" id="deselectAllTargets">取消</button>
          </div>
          <div class="target-selectors" id="targetSelectors">
            <label class="checkbox-label">
              <input type="checkbox" value="xiaohongshu" checked /> 小红书
            </label>
            <label class="checkbox-label">
              <input type="checkbox" value="wechat" /> 公众号
            </label>
            <label class="checkbox-label">
              <input type="checkbox" value="douyin" /> 抖音脚本
            </label>
            <label class="checkbox-label">
              <input type="checkbox" value="zhihu" /> 知乎
            </label>
            <label class="checkbox-label">
              <input type="checkbox" value="bilibili" /> B站
            </label>
          </div>
        </div>
      </div>

      <!-- Results section -->
      <section class="card results-card" id="resultsSection" style="display:none">
        <div class="card-header">
          <h2>🎯 改写结果</h2>
          <button class="btn btn-sm" id="collapseAllBtn">全部折叠</button>
        </div>
        <div id="resultsContainer"></div>
      </section>

      <!-- Publishing Queue section -->
      <section class="card queue-card" id="queueSection">
        <div class="card-header">
          <h2>📋 发布清单</h2>
          <div class="queue-actions">
            <span id="queueStats" style="font-size:12px;color:var(--text-secondary)"></span>
          </div>
        </div>
        <div id="queueContainer">
          <p class="empty-hint">还没有待发布的内容。转换结果出来后，点「📋 加入清单」保存到这里。</p>
        </div>
      </section>

      <!-- History section -->
      <section class="card history-card" id="historySection">
        <div class="card-header">
          <h2>📋 历史记录</h2>
          <button class="btn btn-sm" id="clearHistoryBtn">清空</button>
        </div>
        <div id="historyContainer">
          <p class="empty-hint">还没有转换记录</p>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Made with Vibe Coding ✦ 写一次 · 发全网</p>
    </footer>
  </div>

  <script src="templates.js"></script>
  <script src="transformers.js"></script>
  <script src="ai-engine.js"></script>
  <script src="app.js"></script>
</body>
</html>
